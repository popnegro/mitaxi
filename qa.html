<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiGO Mendoza | Pedir Taxi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --success: #25d366; }
        body { background: #f4f4f4; font-family: 'Roboto', sans-serif; }
        
        /* La tarjeta ahora envuelve todo */
        .main-card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* Mapa ocupa el ancho superior completo */
        #map { height: 300px; width: 100%; background: #eee; }
        
        .p-4 { padding: 20px; } /* Espaciado para los inputs */

        @keyframes pulse-whatsapp {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        .btn-whatsapp { 
            background: var(--success); color: #fff; padding: 15px; border-radius: 12px; border: none; width: 100%; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s;
        }
        .btn-whatsapp:not(:disabled) { animation: pulse-whatsapp 2s infinite; }
        .btn-whatsapp:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="main-card">
                    <div id="map"></div>
                    
                    <div class="p-4">
                        <div class="mb-3">
                            <label class="form-label fw-bold">¿Dónde estás?</label>
                            <div class="input-group">
                                <input type="text" id="origen" class="form-control" placeholder="Detectando dirección...">
                                <button class="btn btn-outline-secondary" onclick="obtenerUbicacion()"><i class="bi bi-crosshair"></i></button>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">¿A dónde vas?</label>
                            <input type="text" id="destino" class="form-control" placeholder="Ej: Plaza Independencia">
                        </div>

                        <div class="alert alert-light border text-center py-2 mb-3">
                            <small class="text-muted d-block">PRECIO ESTIMADO</small>
                            <h4 class="fw-bold text-primary mb-0" id="precio-estimado">$ 0</h4>
                        </div>

                        <button id="btn-pedir" onclick="validarYEnviar()" class="btn-whatsapp" disabled>
                            <i class="bi bi-whatsapp fs-4"></i> PEDIR TAXI
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAmTzHBhtQ4E8BG6DL0xdrEOYdZmQEBXkI&libraries=places&callback=initMap" async defer></script>
    <script>
        let map, markerOrigen, markerDestino, directionsService, directionsRenderer, precisionCircle;
        const miTelefono = "5492613871088";

        function initMap() {
            const mza = { lat: -32.8895, lng: -68.8441 };
            map = new google.maps.Map(document.getElementById("map"), { zoom: 14, center: mza, disableDefaultUI: true });
            
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ map: map, suppressMarkers: true });
            
            markerOrigen = new google.maps.Marker({ map: map, icon: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png' });
            markerDestino = new google.maps.Marker({ map: map, visible: false, icon: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png' });

            const boundsMza = { north: -32.7, south: -33.1, east: -68.7, west: -69.0 };
            
            new google.maps.places.Autocomplete(document.getElementById('origen'), { componentRestrictions: { country: "ar" } }).setBounds(boundsMza);
            const autoDestino = new google.maps.places.Autocomplete(document.getElementById('destino'), { componentRestrictions: { country: "ar" } });
            autoDestino.setBounds(boundsMza);

            autoDestino.addListener('place_changed', () => {
                const place = autoDestino.getPlace();
                if (place.geometry) {
                    markerDestino.setPosition(place.geometry.location);
                    markerDestino.setVisible(true);
                    calcularRuta();
                }
            });

            obtenerUbicacion();
        }

        function obtenerUbicacion() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const latLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    if (!precisionCircle) {
                        precisionCircle = new google.maps.Circle({ map: map, fillColor: '#25d366', fillOpacity: 0.2, strokeOpacity: 0 });
                    }
                    precisionCircle.setCenter(latLng);
                    precisionCircle.setRadius(pos.coords.accuracy);
                    markerOrigen.setPosition(latLng);
                    map.setCenter(latLng);
                    new google.maps.Geocoder().geocode({ location: latLng }, (r) => {
                        if (r[0]) document.getElementById('origen').value = r[0].formatted_address;
                    });
                });
            }
        }

        function calcularRuta() {
            directionsService.route({
                origin: document.getElementById('origen').value,
                destination: document.getElementById('destino').value,
                travelMode: 'DRIVING'
            }, (res, status) => {
                if (status === 'OK') {
                    directionsRenderer.setDirections(res);
                    map.fitBounds(res.routes[0].bounds);
                    const km = res.routes[0].legs[0].distance.value / 1000;
                    document.getElementById('precio-estimado').innerText = `$ ${Math.round(1200 + (km * 600))}`;
                    document.getElementById('btn-pedir').disabled = false;
                }
            });
        }

        function validarYEnviar() {
            const texto = `🚕 *PEDIDO TAXIGO*\n📍 Origen: ${document.getElementById('origen').value}\n🏁 Destino: ${document.getElementById('destino').value}\n💰 Precio: ${document.getElementById('precio-estimado').innerText}`;
            window.open(`https://wa.me/${miTelefono}?text=${encodeURIComponent(texto)}`, '_blank');
        }
    </script>
</body>
</html>
