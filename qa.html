<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiGO Mendoza | Pedir Taxi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --success: #25d366; }
        body { background: #f4f4f4; font-family: 'Roboto', sans-serif; }
        .main-card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #map { height: 100px; width: 100%; background: #eee; }
        .p-4 { padding: 20px; }
        #precio-estimado { transition: opacity 0.5s ease-in-out; opacity: 0; }
        .precio-visible { opacity: 1 !important; }
        .btn-whatsapp { background: var(--success); color: #fff; padding: 15px; border-radius: 12px; border: none; width: 100%; font-weight: bold; }
        .btn-whatsapp:disabled { background: #ccc; }
    </style>
</head>
<body>
    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="main-card">
                    <div id="map"></div>
                    <div class="p-4">
                        <div class="mb-3"><label class="form-label fw-bold">Nombre</label><input type="text" id="user-name" class="form-control" placeholder="Tu nombre"></div>
                        <div class="mb-3"><label class="form-label fw-bold">Origen</label><div class="input-group"><input type="text" id="origen" class="form-control" placeholder="Detectando dirección..."><button class="btn btn-outline-secondary" onclick="obtenerUbicacion()"><i class="bi bi-crosshair"></i></button></div></div>
                        <div class="mb-3"><label class="form-label fw-bold">Destino</label><input type="text" id="destino" class="form-control" placeholder="¿A dónde vas?"></div>
                        <div class="mb-3"><label class="form-label fw-bold">Forma de Pago</label><select id="forma-pago" class="form-select"><option value="Efectivo">Efectivo</option><option value="Mercado Pago">Mercado Pago</option></select></div>
                        <div class="mb-3"><label class="form-label fw-bold">Reserva</label><input type="datetime-local" id="reserva" class="form-control"></div>
                        <div class="alert alert-light border text-center py-2 mb-3"><small class="text-muted d-block">PRECIO ESTIMADO</small><h4 class="fw-bold text-primary mb-0" id="precio-estimado">$ 0</h4></div>
                        <button id="btn-pedir" onclick="prepararConfirmacion()" class="btn-whatsapp" disabled>PEDIR TAXI</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalConfirmar" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body p-4" id="resumen-pedido"></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Editar</button><button class="btn btn-success" onclick="ejecutarEnvio()">Confirmar Pedido</button></div></div></div></div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAmTzHBhtQ4E8BG6DL0xdrEOYdZmQEBXkI&libraries=places&callback=initMap" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let map, markerOrigen, markerDestino, directionsService, directionsRenderer;
        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), { zoom: 14, center: {lat: -32.8895, lng: -68.8441}, disableDefaultUI: true });
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ map: map, suppressMarkers: true });
            markerOrigen = new google.maps.Marker({ map: map, icon: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png' });
            markerDestino = new google.maps.Marker({ map: map, visible: false, icon: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png' });
            
            const autoOpt = { componentRestrictions: { country: "ar" } };
            new google.maps.places.Autocomplete(document.getElementById('origen'), autoOpt);
            const autoD = new google.maps.places.Autocomplete(document.getElementById('destino'), autoOpt);
            autoD.addListener('place_changed', () => { markerDestino.setPosition(autoD.getPlace().geometry.location); markerDestino.setVisible(true); calcularRuta(); });
            
            const ahora = new Date(); ahora.setMinutes(ahora.getMinutes() - ahora.getTimezoneOffset());
            document.getElementById('reserva').setAttribute('min', ahora.toISOString().slice(0, 16));
        }

        function obtenerUbicacion() {
            navigator.geolocation.getCurrentPosition(pos => {
                const latLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                markerOrigen.setPosition(latLng); map.setCenter(latLng);
                new google.maps.Geocoder().geocode({ location: latLng }, r => { if(r[0]) document.getElementById('origen').value = r[0].formatted_address; });
            });
        }

        function calcularRuta() {
            directionsService.route({ origin: document.getElementById('origen').value, destination: document.getElementById('destino').value, travelMode: 'DRIVING' }, (res, status) => {
                if (status === 'OK') {
                    directionsRenderer.setDirections(res); map.fitBounds(res.routes[0].bounds);
                    const precio = Math.round(1200 + (res.routes[0].legs[0].distance.value / 1000 * 600));
                    const disp = document.getElementById('precio-estimado');
                    disp.innerText = `$ ${precio.toLocaleString('es-AR')}`;
                    disp.classList.add('precio-visible');
                    document.getElementById('btn-pedir').disabled = false;
                }
            });
        }

        function prepararConfirmacion() {
            document.getElementById('resumen-pedido').innerHTML = `<b>Resumen:</b><br>${document.getElementById('user-name').value}<br>De: ${document.getElementById('origen').value}<br>A: ${document.getElementById('destino').value}<br>Total: ${document.getElementById('precio-estimado').innerText}`;
            new bootstrap.Modal(document.getElementById('modalConfirmar')).show();
        }

        function ejecutarEnvio() {
            const txt = `🚕 PEDIDO TAXIGO\n👤 ${document.getElementById('user-name').value}\n📍 ${document.getElementById('origen').value}\n🏁 ${document.getElementById('destino').value}\n💰 ${document.getElementById('precio-estimado').innerText}\n💳 ${document.getElementById('forma-pago').value}`;
            window.open(`https://wa.me/5492613871088?text=${encodeURIComponent(txt)}`, '_blank');
        }
    </script>
</body>
</html>
