<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiGO Mendoza | Pedir Taxi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --success: #25d366; }
        body { background: #f4f4f4; font-family: 'Roboto', sans-serif; }
        .main-card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #map { height: 250px; background: #eee; border-radius: 15px; margin-bottom: 15px; }
        .btn-whatsapp { background: var(--success); color: #fff; padding: 15px; border-radius: 12px; border: none; width: 100%; font-weight: bold; }
        .btn-whatsapp:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card main-card">
                    <small class="text-muted"><i class="bi bi-geo-alt-fill text-danger"></i> <span id="ubicacion-status">Localizando...</span></small>
                    <div id="map"></div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre</label>
                        <input type="text" id="user-name" class="form-control" placeholder="Tu nombre">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">¿A dónde vas?</label>
                        <input type="text" id="destino" class="form-control" placeholder="Ej: Plaza Independencia">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Forma de Pago</label>
                        <select id="forma-pago" class="form-select">
                            <option value="Efectivo">Efectivo</option>
                            <option value="Mercado Pago">Mercado Pago</option>
                            <option value="Tarjeta">Tarjeta</option>
                        </select>
                    </div>

                    <div class="alert alert-light border text-center py-2 mb-3">
                        <small class="text-muted d-block">PRECIO ESTIMADO</small>
                        <h4 class="fw-bold text-primary mb-0" id="precio-estimado">$ 0</h4>
                    </div>

                    <button id="btn-pedir" onclick="validarYEnviar()" class="btn-whatsapp" disabled>PEDIR TAXI</button>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalExito" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 25px;">
                <div class="modal-body p-4 text-center">
                    <i class="bi bi-check-circle-fill text-success display-2"></i>
                    <h3 class="fw-bold mt-3">¡Pedido Confirmado!</h3>
                    <button class="btn btn-dark w-100 py-3 rounded-pill fw-bold mb-2" data-bs-dismiss="modal">VOLVER AL MAPA</button>
                    <button onclick="enviarConsulta('¿Mi taxi demora?')" class="btn btn-outline-secondary w-100 py-3 rounded-pill fw-bold mb-2">¿MI TAXI DEMORA?</button>
                    <button onclick="activarSOS()" class="btn btn-danger w-100 py-3 rounded-pill fw-bold"><i class="bi bi-shield-fill-exclamation"></i> COMPARTIR VIAJE (SOS)</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAmTzHBhtQ4E8BG6DL0xdrEOYdZmQEBXkI&libraries=places&callback=initMap" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let map, markerOrigen, markerDestino, service, geocoder;
        let userLatLng = null, userAddress = "Ubicación detectada";
        const miTelefono = "5492613871088";

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), { zoom: 14, center: {lat: -32.8895, lng: -68.8458} });
            service = new google.maps.DistanceMatrixService();
            geocoder = new google.maps.Geocoder();
            markerOrigen = new google.maps.Marker({ map: map });
            markerDestino = new google.maps.Marker({ map: map, visible: false });

            // Autocomplete configurado correctamente
            const inputDestino = document.getElementById('destino');
            const autocomplete = new google.maps.places.Autocomplete(inputDestino);
            
            autocomplete.addListener('place_changed', () => {
                const place = autocomplete.getPlace();
                if (place.geometry) {
                    markerDestino.setPosition(place.geometry.location);
                    markerDestino.setVisible(true);
                    calcularRutaReal();
                }
            });

            // Evento para habilitar botón si escribe manualmente
            inputDestino.addEventListener('input', () => {
                if (inputDestino.value.length > 5) document.getElementById('btn-pedir').disabled = false;
                else document.getElementById('btn-pedir').disabled = true;
            });

            obtenerUbicacion();
        }

        function obtenerUbicacion() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        userLatLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        markerOrigen.setPosition(userLatLng);
                        map.setCenter(userLatLng);
                        geocoder.geocode({location: userLatLng}, r => { 
                            if(r[0]) userAddress = r[0].formatted_address; 
                            document.getElementById('ubicacion-status').innerText = "Ubicación lista ✅"; 
                        });
                    },
                    () => {
                        userLatLng = { lat: -32.8895, lng: -68.8458 };
                        map.setCenter(userLatLng);
                        document.getElementById('ubicacion-status').innerText = "GPS desactivado";
                        document.getElementById('btn-pedir').disabled = false;
                    }
                );
            }
        }

        function calcularRutaReal() {
            const destino = document.getElementById('destino').value;
            if (!userLatLng || destino.length < 5) return;

            service.getDistanceMatrix({
                origins: [userLatLng],
                destinations: [destino],
                travelMode: 'DRIVING'
            }, (res, status) => {
                if (status === 'OK' && res.rows[0].elements[0].status === 'OK') {
                    const km = res.rows[0].elements[0].distance.value / 1000;
                    const precio = 1200 + (km * 600);
                    document.getElementById('precio-estimado').innerText = `$ ${Math.round(precio).toLocaleString('es-AR')}`;
                    document.getElementById('btn-pedir').disabled = false;
                }
            });
        }

        function validarYEnviar() {
            const nombre = document.getElementById('user-name').value;
            if(!nombre) return alert("Ingresá tu nombre");
            const texto = `🚕 *PEDIDO TAXIGO*\n👤 ${nombre}\n📍 ${userAddress}\n🏁 ${document.getElementById('destino').value}\n💰 ${document.getElementById('precio-estimado').innerText}\n💳 ${document.getElementById('forma-pago').value}`;
            window.open(`https://wa.me/${miTelefono}?text=${encodeURIComponent(texto)}`, '_blank');
            new bootstrap.Modal(document.getElementById('modalExito')).show();
        }

        function enviarConsulta(msg) { window.open(`https://wa.me/${miTelefono}?text=${encodeURIComponent(msg)}`, '_blank'); }

        function activarSOS() {
            window.open(`https://wa.me/?text=${encodeURIComponent("🚨 SOS - Estoy en un TaxiGO y necesito ayuda.")}`, '_blank');
        }
    </script>
</body>
</html>
