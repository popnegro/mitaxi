<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiTaxi Mendoza | Pedir Taxi y Remises</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --taxi-yellow: #ffc107; --whatsapp-green: #25d366; --dark-bg: #212529; }
        body { background: #f4f7f6; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden; }
        
        .main-card { 
            background: #fff; 
            border-radius: 28px; 
            padding: 24px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); 
            border: none;
            margin-top: 10px;
        }

        /* Estilo del Mapa */
        .map-wrapper { position: relative; margin-bottom: 20px; border-radius: 20px; overflow: hidden; border: 1px solid #eee; }
        #map { height: 175px; background: #e9ecef; }

        .map-loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 5; transition: opacity 0.6s ease;
        }
        .map-loader.fade-out { opacity: 0; pointer-events: none; }

        /* Inputs y Diseño */
        .form-label { font-size: 0.75rem; letter-spacing: 1px; color: #6c757d; margin-bottom: 5px; }
        .form-control-lg { 
            border-radius: 14px; font-size: 0.95rem; border: 1px solid #e0e0e0; 
            padding: 12px 15px; background: #f9f9f9;
        }
        .form-control-lg:focus { background: #fff; border-color: var(--taxi-yellow); box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.15); }
        .input-group-text { border-radius: 14px 0 0 14px; background: #f9f9f9; border: 1px solid #e0e0e0; border-right: none; }

        /* Precio Badge */
        .price-badge {
            background: #fffdf5; border: 2px dashed var(--taxi-yellow);
            border-radius: 16px; padding: 15px; margin: 20px 0;
        }

        /* Botón WhatsApp */
        .btn-whatsapp { 
            background: var(--whatsapp-green); color: #fff; padding: 18px; 
            border-radius: 18px; border: none; width: 100%; font-weight: 800; 
            transition: all 0.3s ease; display: block; text-align: center; text-decoration: none;
        }
        .btn-whatsapp:hover { background: #1eb956; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3); }
        .btn-whatsapp:disabled { background: #ccc; transform: none; box-shadow: none; }

        /* Toast Estilo Píldora */
        .toast-container { z-index: 3000; }
        .custom-toast {
            border-radius: 18px !important; background: rgba(33, 37, 41, 0.9) !important;
            backdrop-filter: blur(8px); color: white; border: 1px solid var(--taxi-yellow) !important;
            padding: 5px 20px; min-width: 320px;
        }

        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .anim-check { animation: bounce 0.5s ease infinite; }
    </style>
</head>

<body>

    <div class="toast-container position-fixed top-0 start-50 translate-middle-x mt-4">
        <div id="liveToast" class="toast custom-toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body small text-center w-100">
                    <i class="bi bi-whatsapp text-success me-2"></i> 
                    <b>¡Atención!</b> No olvides envíar el pedido por WhatsApp para confirmar tu arribo.
                </div>
            </div>
        </div>
    </div>

    <main class="container py-3">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div class="text-center mb-3">
                    <h2 class="fw-bold text-dark">Mi<span class="text-warning">Taxi</span></h2>
                </div>

                <div class="card main-card">
                                    
                    <div class="map-wrapper">
                        <div id="map-spinner" class="map-loader">
                            <div class="spinner-border text-warning" role="status"></div>
                            <span class="small mt-2 fw-bold">Localizando...</span>
                        </div>
                        <div id="map"></div>
                    </div>

                    <div class="mb-2">
                        <label class="form-label fw-bold">ORIGEN</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-geo-alt-fill text-danger"></i></span>
                            <input type="text" id="origen" class="form-control form-control-lg border-start-0 ps-0" placeholder="¿Dónde estás?">
                        </div>
                    </div>

                    <div class="mb-2">
                        <label class="form-label fw-bold">DESTINO</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-flag-fill text-primary"></i></span>
                            <input type="text" id="destino" class="form-control form-control-lg border-start-0 ps-0" placeholder="¿A dónde vas?">
                        </div>
                    </div>

                    <div class="mb-2">
                        <label class="form-label fw-bold">TU NOMBRE</label>
                        <input type="text" id="user-name" class="form-control form-control-lg" placeholder="Ej: Juan Pérez">
                    </div>

                    <div class="price-badge text-center">
                        <span class="small text-muted fw-bold d-block mb-1">TARIFA ESTIMADA</span>
                        <h2 class="fw-bold text-dark mb-0" id="precio-estimado">$ 0</h2>
                    </div>

                    <button id="btn-pedir" onclick="validarYEnviarPedido()" class="btn-whatsapp" disabled>
                        <span id="btn-text">SOLICITAR VIAJE AHORA</span>
                        
                        <span id="btn-loader" class="d-none">
                            <span class="spinner-border spinner-border-sm me-2"></span> PROCESANDO...
                        </span>

                        <span id="btn-success-icon" class="d-none">
                            <i class="bi bi-check-circle-fill anim-check"></i> ¡LISTO!
                        </span>
                    </button>

                    <p class="text-center mt-3 text-muted" style="font-size: 0.7rem;">
                        * El precio final depende del taxímetro oficial.
                    </p>
                </div>
            </div>
        </div>
    </main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAmTzHBhtQ4E8BG6DL0xdrEOYdZmQEBXkI&libraries=places&callback=initMap" async defer></script>

<script>
    let map, markerOrigen, directionsService, directionsRenderer, geocoder;
    const miTelefono = "5492616706710";

    // Límites estrictos de Mendoza
    const mendozaBounds = { north: -31.95, south: -37.55, west: -70.50, east: -66.50 };

    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 14, center: { lat: -32.8895, lng: -68.8458 },
            disableDefaultUI: true,
            styles: [{ elementType: "geometry", stylers: [{ color: "#f5f5f5" }] }, { featureType: "transit", stylers: [{ visibility: "off" }] }],
            restriction: { latLngBounds: mendozaBounds, strictBounds: false }
        });

        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ map: map, polylineOptions: { strokeColor: "#ffc107", strokeWeight: 6 } });
        geocoder = new google.maps.Geocoder();
        markerOrigen = new google.maps.Marker({ map: map, icon: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png' });

        const autocompleteOptions = { bounds: mendozaBounds, componentRestrictions: { country: "ar" }, strictBounds: true };
        const autoO = new google.maps.places.Autocomplete(document.getElementById('origen'), autocompleteOptions);
        const autoD = new google.maps.places.Autocomplete(document.getElementById('destino'), autocompleteOptions);

        autoO.addListener('place_changed', () => {
            const place = autoO.getPlace();
            if (place.geometry) {
                map.setCenter(place.geometry.location);
                markerOrigen.setPosition(place.geometry.location);
                calcularViaje();
            }
        });
        autoD.addListener('place_changed', calcularViaje);

        // Recuperar nombre guardado
        document.getElementById('user-name').value = localStorage.getItem('taxigo_user_name') || "";
        obtenerUbicacionActual();
    }

    function obtenerUbicacionActual() {
        // Timeout de seguridad: si en 7s no localiza, quita el loader
        setTimeout(() => document.getElementById('map-spinner').classList.add('fade-out'), 7000);

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                markerOrigen.setPosition(userPos);
                map.setCenter(userPos);
                geocoder.geocode({ location: userPos }, (results, status) => {
                    document.getElementById('map-spinner').classList.add('fade-out');
                    if (status === "OK" && results[0]) document.getElementById('origen').value = results[0].formatted_address;
                });
            }, () => document.getElementById('map-spinner').classList.add('fade-out'));
        }
    }

    function calcularViaje() {
        const o = document.getElementById('origen').value;
        const d = document.getElementById('destino').value;
        if (o && d) {
            directionsService.route({ origin: o, destination: d, travelMode: 'DRIVING' }, (response, status) => {
                if (status === 'OK') {
                    directionsRenderer.setDirections(response);
                    markerOrigen.setVisible(false);
                    const km = response.routes[0].legs[0].distance.value / 1000;
                    const precio = Math.round(1200 + (km * 650)); // Ajuste de tarifa
                    document.getElementById('precio-estimado').innerText = `$ ${precio.toLocaleString('es-AR')}`;
                    document.getElementById('btn-pedir').disabled = false;
                }
            });
        }
    }

    function validarYEnviarPedido() {
        const nombre = document.getElementById('user-name').value.trim();
        const origen = document.getElementById('origen').value;
        const destino = document.getElementById('destino').value;
        const precio = document.getElementById('precio-estimado').innerText;

        if (!nombre) {
            alert("⚠️ Por favor, ingresá tu nombre.");
            return;
        }

        // Bloqueo de doble clic
        const btn = document.getElementById('btn-pedir');
        btn.disabled = true;

        // Mostrar Toast
        new bootstrap.Toast(document.getElementById('liveToast')).show();

        document.getElementById('btn-text').classList.add('d-none');
        document.getElementById('btn-loader').classList.remove('d-none');
        localStorage.setItem('taxigo_user_name', nombre);

        // Generar Link de Google Maps Directions
        const mapaLink = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origen)}&destination=${encodeURIComponent(destino)}&travelmode=driving`;

        setTimeout(() => {
            document.getElementById('btn-loader').classList.add('d-none');
            document.getElementById('btn-success-icon').classList.remove('d-none');
            btn.style.background = "#198754";

            const msg = `*NUEVO PEDIDO MITAXI*\n\n` +
                        `👤 *Pasajero:* ${nombre}\n` +
                        `📍 *Origen:* ${origen}\n` +
                        `🏁 *Destino:* ${destino}\n` +
                        `💰 *Precio Est:* ${precio}\n\n` +
                        `🗺️ *Ruta para el Chofer:*\n${mapaLink}\n\n` +
                        `_Por favor, enviar este mensaje para que la operadora confirme el arribo._`;

            window.location.href = `https://api.whatsapp.com/send?phone=${miTelefono}&text=${encodeURIComponent(msg)}`;
            
            setTimeout(() => location.reload(), 4000);
        }, 2200);
    }
</script>
</body>
</html>
