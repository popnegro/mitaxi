<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiTaxi Mendoza | Pedir Taxi y Remises</title>

    <link rel="preconnect" href="https://maps.googleapis.com">
    <link rel="preconnect" href="https://maps.gstatic.com">
    <link rel="dns-prefetch" href="https://maps.googleapis.com">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --taxi-yellow: #ffc107;
            --whatsapp-green: #25d366;
            --dark-bg: #212529;
        }

        body {
            background: #000;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            padding-bottom: 80px; /* Espacio para el widget de Brevo */
        }

        .main-card {
            padding: 0 !important;
            overflow: hidden;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: none;
        }

        .map-wrapper {
            position: relative;
            margin-bottom: 0;
            height: 180px;
            width: 100%;
            border-radius: 0;
            border: none;
            border-bottom: 1px solid #eee;
        }

        .form-container-inner {
            padding: 20px 24px 24px 24px;
        }

        #map {
            height: 100%;
            background: #e9ecef;
        }

        .map-loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: opacity 0.6s ease;
        }

        .map-loader.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .form-label {
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: #6c757d;
            margin-bottom: 5px;
        }

        .form-control-lg {
            border-radius: 8px;
            font-size: 0.95rem;
            border: 1px solid #e0e0e0;
            padding: 12px 15px;
            background: #f9f9f9;
        }

        .form-control-lg:focus {
            border-color: var(--taxi-yellow);
            box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.2);
        }

        .input-group-text {
            border-radius: 8px 0 0 8px;
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-right: none;
        }

        .price-badge {
            background: #fffdf5;
            border: 2px dashed var(--taxi-yellow);
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
        }

        .btn-whatsapp {
            background: var(--whatsapp-green);
            color: #fff;
            padding: 18px;
            border-radius: 8px;
            border: none;
            width: 100%;
            font-weight: 800;
            transition: all 0.3s ease;
            display: block;
            text-align: center;
            text-decoration: none;
        }

        .btn-whatsapp:hover:not(:disabled) {
            background: #1eb956;
            transform: translateY(-3px);
        }

        .btn-whatsapp:disabled {
            background: #ccc;
            transform: none;
            cursor: not-allowed;
        }

        .toast-container.footer-fixed {
            bottom: 0 !important;
            top: auto !important;
            left: 0 !important;
            right: 0 !important;
            transform: none !important;
            width: 100% !important;
            padding: 0;
            margin: 0;
            z-index: 2000;
        }

        .custom-toast.footer-style {
            width: 100% !important;
            max-width: 100% !important;
            margin: 0;
            border: none !important;
            border-radius: 8px 8px 0 0 !important;
            background: black;
            backdrop-filter: blur(10px);
            box-shadow: 0 -10px 25px rgba(0, 0, 0, 0.3);
        }

        .custom-toast.footer-style .toast-body {
            padding: 20px;
            color: white;
        }

        #night-label {
            font-size: 0.7rem;
            color: #6610f2;
            display: none;
        }
    </style>
</head>

<body>
    <div class="toast-container footer-fixed">
        <div id="liveToast" class="toast custom-toast footer-style hide" role="alert" aria-live="assertive"
            aria-atomic="true" data-bs-autohide="false">
            <div class="toast-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="text-start">
                        <div class="d-flex align-items-center mb-1">
                            <div class="spinner-grow spinner-grow-sm text-warning me-2" role="status"></div>
                            <span id="eta-text" class="fw-bold h5 mb-0">Buscando chofer...</span>
                        </div>
                        <p class="small mb-0 opacity-75">Confirmá en WhatsApp para asignar la unidad.</p>
                    </div>
                    <i class="bi bi-whatsapp h1 text-success mb-0"></i>
                </div>
            </div>
        </div>
    </div>

    <main class="container py-3">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="text-center mb-3">
                    <h2 class="fw-bold text-light">Mi<span class="text-warning">Taxi</span></h2>
                </div>

                <div class="card main-card">
                    <div class="map-wrapper">
                        <div id="map-spinner" class="map-loader">Cargando Mapa de Mendoza...</div>
                        <div id="map"></div>
                    </div>

                    <div class="form-container-inner">
                        <div class="mb-2">
                            <label class="form-label fw-bold text-uppercase">Origen</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-geo-alt-fill text-danger"></i></span>
                                <input type="text" id="origen" class="form-control form-control-lg border-start-0 ps-0"
                                    placeholder="¿Dónde estás?">
                            </div>
                        </div>

                        <div class="mb-2">
                            <label class="form-label fw-bold text-uppercase">Destino</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-flag-fill text-primary"></i></span>
                                <input type="text" id="destino" class="form-control form-control-lg border-start-0 ps-0"
                                    placeholder="¿A dónde vas?">
                            </div>
                        </div>

                        <div class="mb-2">
                            <label class="form-label fw-bold text-uppercase">Tu Nombre</label>
                            <input type="text" id="user-name" class="form-control form-control-lg"
                                placeholder="Ej: Luis Grasso" oninput="sincronizarBrevo(this.value)">
                        </div>

                        <div class="price-badge text-center">
                            <div id="night-label" class="fw-bold mb-1"><i class="bi bi-moon-stars-fill"></i> TARIFA
                                NOCTURNA ACTIVADA</div>
                            <span class="small text-muted fw-bold d-block mb-1">TARIFA ESTIMADA</span>
                            <h2 class="fw-bold text-dark mb-0" id="precio-estimado">$ 0</h2>
                        </div>

                        <button id="btn-pedir" onclick="validarYEnviarPedido()" class="btn-whatsapp" disabled>
                            <i class="bi bi-whatsapp me-2"></i>PEDIR VIAJE AHORA
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_KEY = "AIzaSyAmTzHBhtQ4E8BG6DL0xdrEOYdZmQEBXkI";
        const MI_TEL = "5492616706710";
        const MENDOZA_BOUNDS = { north: -32.80, south: -33.00, west: -68.95, east: -68.75 };

        let map, markerOrigen, directionsService, directionsRenderer, geocoder;
        let latO, lngO, latD, lngD;

        function injectGoogleMaps() {
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&libraries=places&callback=initMap`;
            script.async = true;
            script.defer = true;
            document.head.appendChild(script);
        }

        window.addEventListener('load', () => {
            setTimeout(injectGoogleMaps, 1000);
            const savedName = localStorage.getItem('taxigo_user_name');
            if (savedName) document.getElementById('user-name').value = savedName;
        });

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 14,
                center: { lat: -32.8895, lng: -68.8458 },
                disableDefaultUI: true,
                gestureHandling: "greedy"
            });

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                polylineOptions: { strokeColor: "#ffc107", strokeWeight: 6 }
            });
            geocoder = new google.maps.Geocoder();
            markerOrigen = new google.maps.Marker({ map: map });

            const acOptions = { componentRestrictions: { country: "ar" } };
            const autoO = new google.maps.places.Autocomplete(document.getElementById('origen'), acOptions);
            const autoD = new google.maps.places.Autocomplete(document.getElementById('destino'), acOptions);

            autoO.addListener('place_changed', () => {
                const p = autoO.getPlace();
                if (p.geometry) {
                    latO = p.geometry.location.lat();
                    lngO = p.geometry.location.lng();
                    map.setCenter(p.geometry.location);
                    markerOrigen.setPosition(p.geometry.location);
                    calcularViaje();
                }
            });

            autoD.addListener('place_changed', () => {
                const p = autoD.getPlace();
                if (p.geometry) {
                    latD = p.geometry.location.lat();
                    lngD = p.geometry.location.lng();
                    calcularViaje();
                }
            });

            obtenerUbicacionGPS();
        }

        function obtenerUbicacionGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    latO = pos.coords.latitude;
                    lngO = pos.coords.longitude;
                    const coord = { lat: latO, lng: lngO };
                    markerOrigen.setPosition(coord);
                    map.setCenter(coord);

                    geocoder.geocode({ location: coord }, (results, status) => {
                        document.getElementById('map-spinner').classList.add('fade-out');
                        if (status === "OK" && results[0]) {
                            document.getElementById('origen').value = results[0].formatted_address;
                        }
                    });
                }, () => document.getElementById('map-spinner').classList.add('fade-out'));
            } else {
                document.getElementById('map-spinner').classList.add('fade-out');
            }
        }

        function calcularViaje() {
            const o = document.getElementById('origen').value;
            const d = document.getElementById('destino').value;

            if (o && d) {
                directionsService.route({
                    origin: o,
                    destination: d,
                    travelMode: 'DRIVING'
                }, (res, status) => {
                    if (status === 'OK') {
                        directionsRenderer.setDirections(res);
                        markerOrigen.setVisible(false);
                        const distanciaKm = res.routes[0].legs[0].distance.value / 1000;
                        
                        const hora = new Date().getHours();
                        const esNocturno = (hora >= 22 || hora < 6);
                        let tarifaBase = esNocturno ? 1680 : 1400;
                        let precioPorKm = esNocturno ? 900 : 750;

                        document.getElementById('night-label').style.display = esNocturno ? 'block' : 'none';
                        const total = Math.round(tarifaBase + (distanciaKm * precioPorKm));
                        document.getElementById('precio-estimado').innerText = `$ ${total.toLocaleString('es-AR')}`;
                        document.getElementById('btn-pedir').disabled = false;
                    }
                });
            }
        }

        function validarYEnviarPedido() {
            const nombre = document.getElementById('user-name').value.trim();
            const origen = document.getElementById('origen').value;
            const destino = document.getElementById('destino').value;
            const precio = document.getElementById('precio-estimado').innerText;

            if (!nombre) {
                alert("⚠️ Por favor, ingresá tu nombre.");
                document.getElementById('user-name').focus();
                return;
            }

            localStorage.setItem('taxigo_user_name', nombre);
            const minutosETA = Math.floor(Math.random() * 5) + 5;
            document.getElementById('eta-text').innerText = `Móvil asignado a ${minutosETA} min.`;

            const toastEl = document.getElementById('liveToast');
            new bootstrap.Toast(toastEl).show();

            const btn = document.getElementById('btn-pedir');
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>ASIGNANDO...`;

            // Enlace con Coordenadas para el GPS del Chofer
            const linkRuta = `https://www.google.com/maps/dir/?api=1&origin=${latO},${lngO}&destination=${latD},${lngD}&travelmode=driving`;

            const msg = `*NUEVO PEDIDO MITAXI*\n` +
                `👤 *Pasajero:* ${nombre}\n` +
                `📍 *Origen:* ${origen}\n` +
                `🏁 *Destino:* ${destino}\n` +
                `💰 *Estimado:* ${precio}\n` +
                `⏳ *ETA:* ${minutosETA} min\n\n` +
                `🗺️ *GPS Navegación:* \n${linkRuta}`;

            setTimeout(() => {
                window.location.href = `https://wa.me/${MI_TEL}?text=${encodeURIComponent(msg)}`;
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-whatsapp me-2"></i>PEDIR VIAJE AHORA';
                }, 3000);
            }, 2000);
        }

        function sincronizarBrevo(nombre) {
            if (window.BrevoConversations) {
                BrevoConversations('updateContact', { firstname: nombre });
            }
        }
    </script>

    <script>
        (function(d, w, c) {
            w.BrevoConversationsID = '67201df18f77be95230c9447';
            w[c] = w[c] || function() { (w[c].q = w[c].q || []).push(arguments); };
            var s = d.createElement('script'); s.async = true;
            s.src = 'https://conversations-widget.brevo.com/brevo-conversations.js';
            if (d.head) d.head.appendChild(s);
        })(document, window, 'BrevoConversations');
    </script>
</body>
</html>
