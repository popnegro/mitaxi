<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiGO Mendoza | Pedir Taxi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --success: #25d366; --primary-taxi: #ffc107; }
        body { background: #f4f4f4; font-family: 'Roboto', sans-serif; }
        .main-card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); }
        #map { height: 250px; background: #eee; border-radius: 15px; margin-bottom: 15px; }
        
        .btn-whatsapp { background: var(--success); color: #fff; padding: 15px; border-radius: 12px; border: none; width: 100%; font-weight: bold; transition: all 0.3s ease; text-decoration: none; display: block; text-align: center; overflow: hidden; position: relative; }
        .btn-whatsapp:hover { background: #1eb956; color: white; transform: translateY(-2px); }
        .btn-whatsapp:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1.1); opacity: 1; }
        }
        .anim-success { animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; color: white; }
    </style>
</head>

<body>

    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card main-card shadow-sm p-3">
                      <small class="text-muted mb-2 d-block">
                        <i class="bi bi-geo-alt-fill text-danger"></i> 
                        <span id="ubicacion-status">Esperando ubicación...</span>
                    </small>
                    <div id="map"></div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small">¿Dónde estás?</label>
                        <input type="text" id="origen" class="form-control form-control-lg" placeholder="Buscando tu ubicación...">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small">¿A dónde vas?</label>
                        <input type="text" id="destino" class="form-control form-control-lg" placeholder="Ej: Plaza Independencia">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small">Nombre y Apellido</label>
                        <input type="text" id="user-name" class="form-control form-control-lg" placeholder="Tu nombre">
                    </div>

                    <div class="alert alert-light border text-center py-2 mb-3">
                        <small class="text-muted d-block">PRECIO ESTIMADO</small>
                        <h4 class="fw-bold text-primary mb-0" id="precio-estimado">$ 0</h4>
                    </div>

                    <button id="btn-pedir" onclick="validarYEnviarDirecto()" class="btn-whatsapp w-100 py-3 fw-bold" disabled>
                        <span id="btn-text"><i class="bi bi-whatsapp me-2"></i> SOLICITAR COCHE</span>
                        
                        <span id="btn-loader" class="d-none">
                            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                            PROCESANDO...
                        </span>

                        <span id="btn-success-icon" class="d-none anim-success">
                            <i class="bi bi-check-circle-fill me-2"></i> ¡PEDIDO ENVIADO!
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAmTzHBhtQ4E8BG6DL0xdrEOYdZmQEBXkI&libraries=places&callback=initMap" async defer></script>

<script>
    let map, markerOrigen, directionsService, directionsRenderer, geocoder;
    let userLatLng = null;
    const miTelefono = "5492613871088";

    function initMap() {
        const estiloMinimalista = [
            { elementType: "geometry", stylers: [{ color: "#f5f5f5" }] },
            { elementType: "labels.icon", stylers: [{ visibility: "off" }] }
        ];

        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 14, 
            center: { lat: -32.8895, lng: -68.8458 }, // Mendoza Centro
            disableDefaultUI: true,
            styles: estiloMinimalista
        });

        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({
            map: map,
            suppressMarkers: false,
            polylineOptions: { strokeColor: "#25d366", strokeWeight: 5 }
        });

        geocoder = new google.maps.Geocoder();
        markerOrigen = new google.maps.Marker({ map: map });

        const options = { componentRestrictions: { country: "ar" } };
        const autoO = new google.maps.places.Autocomplete(document.getElementById('origen'), options);
        const autoD = new google.maps.places.Autocomplete(document.getElementById('destino'), options);

        autoO.addListener('place_changed', () => {
            const place = autoO.getPlace();
            if (place.geometry) {
                userLatLng = place.geometry.location;
                markerOrigen.setPosition(userLatLng);
                map.setCenter(userLatLng);
                calcularRutaReal();
            }
        });

        autoD.addListener('place_changed', calcularRutaReal);
        obtenerUbicacion();
    }

    function obtenerUbicacion() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                userLatLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                markerOrigen.setPosition(userLatLng);
                map.setCenter(userLatLng);
                geocoder.geocode({ location: userLatLng }, (results, status) => {
                    if (status === "OK" && results[0]) {
                        document.getElementById('origen').value = results[0].formatted_address;
                        document.getElementById('ubicacion-status').innerText = "Ubicación detectada ✅";
                    }
                });
            }, () => {
                document.getElementById('ubicacion-status').innerText = "Ingresa origen manualmente";
            });
        }
    }

    function calcularRutaReal() {
        const o = document.getElementById('origen').value;
        const d = document.getElementById('destino').value;

        if (o && d && d.length > 4) {
            directionsService.route({
                origin: o,
                destination: d,
                travelMode: google.maps.TravelMode.DRIVING
            }, (response, status) => {
                if (status === 'OK') {
                    directionsRenderer.setDirections(response);
                    markerOrigen.setVisible(false);
                    const km = response.routes[0].legs[0].distance.value / 1000;
                    const precio = Math.round(1200 + (km * 600));
                    document.getElementById('precio-estimado').innerText = `$ ${precio.toLocaleString('es-AR')}`;
                    document.getElementById('btn-pedir').disabled = false;
                }
            });
        }
    }

    function validarYEnviarDirecto() {
        const btn = document.getElementById('btn-pedir');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');
        const btnSuccess = document.getElementById('btn-success-icon');
        
        const inputs = {
            nombre: document.getElementById('user-name'),
            origen: document.getElementById('origen'),
            destino: document.getElementById('destino'),
            precio: document.getElementById('precio-estimado')
        };

        if (!inputs.nombre.value.trim()) {
            alert("⚠️ Por favor, ingresá tu nombre para que el chofer te identifique.");
            inputs.nombre.focus();
            return;
        }

        btn.disabled = true;
        btnText.classList.add('d-none');
        btnLoader.classList.remove('d-none');

        setTimeout(() => {
            btnLoader.classList.add('d-none');
            btnSuccess.classList.remove('d-none');
            btn.style.background = "#198754";

            const msg = `*NUEVO PEDIDO TAXIGO*\n👤 *Pasajero:* ${inputs.nombre.value}\n📍 *Origen:* ${inputs.origen.value}\n🏁 *Destino:* ${inputs.destino.value}\n💰 *Precio:* ${inputs.precio.innerText}`;
            window.open(`https://wa.me/${miTelefono}?text=${encodeURIComponent(msg)}`, '_blank');

            setTimeout(() => {
                // RESETEO COMPLETO
                inputs.nombre.value = "";
                inputs.destino.value = "";
                inputs.precio.innerText = "$ 0";
                
                btn.disabled = true;
                btn.style.background = "";
                btnText.classList.remove('d-none');
                btnSuccess.classList.add('d-none');

                directionsRenderer.setDirections({routes: []});
                markerOrigen.setVisible(true);
                if (userLatLng) {
                    map.setCenter(userLatLng);
                    map.setZoom(14);
                }
            }, 3000); // Damos un poco más de tiempo para que vea el éxito antes de resetear
        }, 1200);
    }
</script>
</body>
</html>
