<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiGO Mendoza | Pedir Taxi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --taxi-yellow: #ffc107; --whatsapp-green: #25d366; }
        body { background: #f8f9fa; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        .main-card { 
            background: #fff; 
            border-radius: 24px; 
            padding: 20px; 
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08); 
            border: none;
        }

        .map-wrapper {
            position: relative;
            margin-bottom: 15px;
        }

        #map { 
            height: 200px; 
            background: #e9ecef; 
            border-radius: 18px; 
            border: 1px solid #dee2e6;
        }

        .map-loader {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            border-radius: 18px;
            transition: opacity 0.5s ease;
        }

        .map-loader.fade-out { opacity: 0; pointer-events: none; }

        /* ESTILOS DEL MODAL INFERIOR */
        .offcanvas-bottom {
            height: auto;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.15);
            border-top: 5px solid var(--taxi-yellow);
        }
        .time-badge {
            background: #fff3cd;
            color: #856404;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: 800;
            display: inline-block;
            border: 1px solid #ffeeba;
        }

        .form-control-lg { border-radius: 12px; font-size: 1rem; border: 1px solid #ced4da; }
        .form-control-lg:focus { border-color: var(--taxi-yellow); box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.25); }

        .btn-whatsapp { 
            background: var(--whatsapp-green); 
            color: #fff; 
            padding: 16px; 
            border-radius: 14px; 
            border: none; 
            width: 100%; 
            font-weight: 700; 
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            text-decoration: none; 
            display: block; 
            text-align: center; 
            position: relative;
        }
        .btn-whatsapp:hover { background: #1eb956; transform: translateY(-2px); color: white; }
        .btn-whatsapp:disabled { background: #adb5bd; cursor: not-allowed; transform: none; }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .anim-success { animation: bounceIn 0.5s ease forwards; color: white; display: inline-block; }

        .price-badge {
            background: #fff9e6;
            border: 2px dashed var(--taxi-yellow);
            border-radius: 12px;
            padding: 12px;
        }
    </style>
</head>

<body>

    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div class="text-center mb-3">
                    <h3 class="fw-bold text-dark mb-0">Taxi<span class="text-warning">GO</span></h3>
                </div>

                <div class="card main-card">
                                    
                    <div class="map-wrapper">
                        <div id="map-spinner" class="map-loader">
                            <div class="spinner-border text-warning" role="status"></div>
                            <span class="small mt-2 fw-bold text-dark">Buscando ubicación...</span>
                        </div>
                        <div id="map"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-secondary">¿DÓNDE TE BUSCAMOS?</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-geo-alt text-danger"></i></span>
                            <input type="text" id="origen" class="form-control form-control-lg border-start-0 ps-0" placeholder="Dirección de origen">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-secondary">¿A DÓNDE VAS?</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-flag-fill text-primary"></i></span>
                            <input type="text" id="destino" class="form-control form-control-lg border-start-0 ps-0" placeholder="Dirección de destino">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-secondary">TU NOMBRE</label>
                        <input type="text" id="user-name" class="form-control form-control-lg" placeholder="Para que el chofer te ubique">
                    </div>

                    <div class="price-badge text-center mb-4">
                        <small class="text-muted d-block fw-bold" style="letter-spacing: 1px;">PRECIO ESTIMADO</small>
                        <h2 class="fw-bold text-dark mb-0" id="precio-estimado">$ 0</h2>
                    </div>

                    <button id="btn-pedir" onclick="validarYEnviarPedido()" class="btn-whatsapp" disabled>
                        <span id="btn-text"><i class="bi bi-whatsapp me-2"></i> SOLICITAR VIAJE</span>
                        
                        <span id="btn-loader" class="d-none">
                            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                            BUSCANDO TAXI...
                        </span>

                        <span id="btn-success-icon" class="d-none">
                            <i class="bi bi-check-circle-fill me-2 anim-success"></i> ¡LOGRADO!
                        </span>
                    </button>

                    <p class="text-center mt-4 text-muted small">
                        El precio final será lo que marque el taxímetro
                    </p>
                </div>
            </div>
        </div>
    </main>

    <div class="offcanvas offcanvas-bottom" tabindex="-1" id="timeModal" aria-labelledby="timeModalLabel" data-bs-backdrop="static">
        <div class="offcanvas-body text-center py-4">
            <div class="mb-2">
                <i class="bi bi-taxi-front-fill text-warning" style="font-size: 3rem;"></i>
            </div>
            <h4 class="fw-bold" id="timeModalLabel">¡Taxi Confirmado!</h4>
            <p class="text-muted">Hemos localizado una unidad cerca de tu posición.</p>
            <div class="time-badge fs-3 mb-4">
                <i class="bi bi-clock-history me-2"></i> Llega en <span id="tiempo-llegada">...</span>
            </div>
            <p class="small text-secondary mb-4">Presiona el botón para enviar los datos por WhatsApp al chofer.</p>
            <button type="button" id="btn-confirmar-whatsapp" class="btn btn-dark w-100 rounded-pill py-3 fw-bold">
                CONTINUAR A WHATSAPP <i class="bi bi-arrow-right ms-2"></i>
            </button>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAmTzHBhtQ4E8BG6DL0xdrEOYdZmQEBXkI&libraries=places&callback=initMap" async defer></script>

<script>
    let map, markerOrigen, directionsService, directionsRenderer, geocoder;
    let userLatLng = null;
    const miTelefono = "5492613871088";

    function initMap() {
        const mapStyle = [
            { elementType: "geometry", stylers: [{ color: "#f5f5f5" }] },
            { elementType: "labels.icon", stylers: [{ visibility: "off" }] },
            { featureType: "transit", stylers: [{ visibility: "off" }] }
        ];

        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 15, 
            center: { lat: -32.8895, lng: -68.8458 }, 
            disableDefaultUI: true,
            styles: mapStyle
        });

        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({
            map: map,
            suppressMarkers: false,
            polylineOptions: { 
                strokeColor: "#ffc107", 
                strokeWeight: 7,
                strokeOpacity: 0.8
            }
        });

        geocoder = new google.maps.Geocoder();
        markerOrigen = new google.maps.Marker({ 
            map: map, 
            icon: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png' 
        });

        const options = { componentRestrictions: { country: "ar" } };
        const autoO = new google.maps.places.Autocomplete(document.getElementById('origen'), options);
        const autoD = new google.maps.places.Autocomplete(document.getElementById('destino'), options);

        autoO.addListener('place_changed', () => {
            const place = autoO.getPlace();
            if (place.geometry) {
                userLatLng = place.geometry.location;
                markerOrigen.setPosition(userLatLng);
                map.setCenter(userLatLng);
                calcularViaje();
            }
        });

        autoD.addListener('place_changed', calcularViaje);

        const nombreGuardado = localStorage.getItem('taxigo_user_name');
        if (nombreGuardado) document.getElementById('user-name').value = nombreGuardado;

        obtenerUbicacionActual();
    }

    function obtenerUbicacionActual() {
        document.getElementById('map-spinner').classList.remove('fade-out');

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                userLatLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                markerOrigen.setPosition(userLatLng);
                map.setCenter(userLatLng);
                
                geocoder.geocode({ location: userLatLng }, (results, status) => {
                    document.getElementById('map-spinner').classList.add('fade-out');
                    if (status === "OK" && results[0]) {
                        document.getElementById('origen').value = results[0].formatted_address;
                    }
                });
            }, () => {
                document.getElementById('map-spinner').classList.add('fade-out');
            });
        } else {
            document.getElementById('map-spinner').classList.add('fade-out');
        }
    }

    function calcularViaje() {
        const o = document.getElementById('origen').value;
        const d = document.getElementById('destino').value;

        if (o && d && d.length > 4) {
            directionsService.route({
                origin: o,
                destination: d,
                travelMode: google.maps.TravelMode.DRIVING
            }, (response, status) => {
                if (status === 'OK') {
                    directionsRenderer.setDirections(response);
                    markerOrigen.setVisible(false);
                    const km = response.routes[0].legs[0].distance.value / 1000;
                    const precio = Math.round(1200 + (km * 600));
                    document.getElementById('precio-estimado').innerText = `$ ${precio.toLocaleString('es-AR')}`;
                    document.getElementById('btn-pedir').disabled = false;
                }
            });
        }
    }

    function validarYEnviarPedido() {
        const btn = document.getElementById('btn-pedir');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');
        const btnSuccess = document.getElementById('btn-success-icon');
        const nombre = document.getElementById('user-name').value.trim();

        if (!nombre) {
            alert("⚠️ Por favor, ingresá tu nombre.");
            document.getElementById('user-name').focus();
            return;
        }

        // 1. Iniciamos animación del botón
        localStorage.setItem('taxigo_user_name', nombre);
        btn.disabled = true;
        btnText.classList.add('d-none');
        btnLoader.classList.remove('d-none');

        // 2. Simulamos búsqueda de 2 segundos
        setTimeout(() => {
            btnLoader.classList.add('d-none');
            btnSuccess.classList.remove('d-none');
            btn.style.background = "#198754";

            // 3. Mostramos el Modal en lugar de ir directo a WhatsApp
            const timeModal = new bootstrap.Offcanvas(document.getElementById('timeModal'));
            const minRandom = Math.floor(Math.random() * (8 - 3 + 1) + 3);
            document.getElementById('tiempo-llegada').innerText = `${minRandom} min`;
            timeModal.show();

            // 4. Configuramos el botón del Modal para que ahora sí abra WhatsApp
            document.getElementById('btn-confirmar-whatsapp').onclick = function() {
                const msg = `*NUEVO PEDIDO TAXIGO*\n👤 *Pasajero:* ${nombre}\n📍 *Origen:* ${document.getElementById('origen').value}\n🏁 *Destino:* ${document.getElementById('destino').value}\n💰 *Precio:* ${document.getElementById('precio-estimado').innerText}\n⏱️ *Tiempo est:* ${minRandom} min\n\n_Confirmando viaje..._`;
                window.location.href = `https://api.whatsapp.com/send?phone=${miTelefono}&text=${encodeURIComponent(msg)}`;
                
                // Reset de la interfaz después de un momento
                setTimeout(() => {
                    location.reload(); // Recargamos para limpiar todo
                }, 1000);
            };
        }, 1500);
    }
</script>
</body>
</html>
